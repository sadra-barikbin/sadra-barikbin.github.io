# ------------------------------------------------------------------
#  Site settings
# ------------------------------------------------------------------
title                    : "Sadra Barikbin"
masthead_title           : "Sadra Barikbin"
name                     : "Sadra Barikbin"
description              : >-
  A personal notebook — essays, fragments, and pictures gathered from
  the culture I carry with me.
url                      : "https://sadra-barikbin.github.io"
baseurl                  : ""
repository               : "sadra-barikbin/sadra-barikbin.github.io"
locale                   : "en-US"
words_per_minute         : 180

# Default image used when a page is shared on social media.
og_image                 : /assets/images/og-default.svg

# ------------------------------------------------------------------
#  Theme — Minimal Mistakes pulled in as a remote theme so GitHub
#  Pages builds it natively. Pin the version for reproducibility.
# ------------------------------------------------------------------
remote_theme             : "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin    : "default"      # custom palette lives in assets/css/main.scss
search                   : false

# ------------------------------------------------------------------
#  Build
# ------------------------------------------------------------------
markdown                 : kramdown
highlighter              : rouge
breadcrumbs              : false
enable_copy_code_button  : true

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap

# Keep build artefacts and project files out of the published site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .sass-cache
  - .jekyll-cache
  - node_modules
  - README.md

include:
  - _pages

# ------------------------------------------------------------------
#  Archives
# ------------------------------------------------------------------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ------------------------------------------------------------------
#  Author — shown in meta and the footer. Replace the placeholders
#  with your own links (LinkedIn URL, CV, etc.).
# ------------------------------------------------------------------
author:
  name             : "Sadra Barikbin"
  bio              : "Keeping the parts that don't fit on a résumé."
  avatar           : "/assets/images/avatar.jpg"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sadraqazvin1@yahoo.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sadra-barikbin"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sadrodin-barikbin/"

footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:sadraqazvin1@yahoo.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/sadra-barikbin"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/sadrodin-barikbin/"

# ------------------------------------------------------------------
#  Front-matter defaults
# ------------------------------------------------------------------
defaults:
  # Posts — "pieces". A clean, single reading column.
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: false
      related: true
      show_date: true
      toc: false
  # Standalone pages.
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
